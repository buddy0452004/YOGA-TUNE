<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Forgot Password - Yogatune</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f0f8f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 12px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    .box h2 {
      color: #2e8b57;
    }
    .box input {
      width: 100%;
      padding: 10px;
      margin-top: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
    .box button {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #FFA500;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }
    .message {
      margin-top: 15px;
      color: green;
    }
    .error {
      margin-top: 15px;
      color: red;
    }
  </style>
</head>
<body>
  <div class="box">
    <h2>Forgot Password</h2>
    {% with messages = get_flashed_messages(category_filter=['forgot_error', 'forgot_success']) %}
      {% if messages %}
        {% for message in messages %}
          <div class="{{ 'error' if '❗' in message else 'message' }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="POST" action="/forgot-password">
      <input type="email" name="forgot_email" placeholder="Enter your registered email" required>
      <button type="submit">Send Reset Link</button>
    </form>
  </div>
</body>
</html>
